schema_version: "1.0"

extension:
  id: "sybilion-dojo"
  name: "Sybilion Dojo Workflow"
  version: "1.5.1"
  description: "Sybilion corporate workflow with mandatory Dojo contract validation"
  author: "Sybilion Engineering"
  license: MIT

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: dojo
      required: true

provides:
  commands:
    - name: speckit.sybilion-dojo.init
      file: commands/init.md
      description: "Apply Sybilion constitution template before constitution generation"
    - name: speckit.sybilion-dojo.frame
      file: commands/frame.md
      description: "Socratic framing of user intent before spec drafting"
    - name: speckit.sybilion-dojo.contract
      file: commands/contract.md
      description: "Generate Dojo blackbox contracts from plan"
    - name: speckit.sybilion-dojo.validate
      file: commands/validate.md
      description: "Run the project linter and Dojo tests, fix until green"

hooks:
  before_constitution:
    command: speckit.sybilion-dojo.init
    optional: false
    description: "Apply Sybilion constitution template before generation"
  before_specify:
    command: speckit.sybilion-dojo.frame
    optional: true
    description: "Frame the problem (Socratic) before spec drafting"
  after_plan:
    command: speckit.sybilion-dojo.contract
    optional: false
    description: "Generate Dojo contracts after planning"
  after_implement:
    command: speckit.sybilion-dojo.validate
    optional: false
    description: "Run linter and Dojo tests after implementation"

tags:
  - "sybilion"
  - "dojo"
  - "tdd"
