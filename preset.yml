schema_version: "1.0"

preset:
  id: "sybilion-dojo"
  name: "Sybilion Dojo Workflow"
  version: "1.0.0"
  description: "Sybilion corporate workflow with mandatory Dojo contract validation"
  author: "Sybilion Engineering"

requires:
  speckit_version: ">=0.8.0"

provides:
  commands:
    - name: "speckit.sybilion.contract"
      file: "commands/contract.md"
      description: "Generate Dojo contracts from plan"
    - name: "speckit.sybilion.validate"
      file: "commands/validate.md"
      description: "Run linters and Dojo tests"

  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Sybilion corporate constitution"
      strategy: "replace"

hooks:
  after_plan:
    command: "speckit.sybilion.contract"
    optional: false

  after_implement:
    command: "speckit.sybilion.validate"
    optional: false
